<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Wife's Timeline Game</title>
    <style>
        /* General Styles */
        :root {
            --primary-bg: #ffe45e; /* Yellow background */
            --card-purple: #c3a1e6;
            --card-yellow: #f8e178;
            --card-green: #90d8a5;
            --card-pink: #f4a5b4;
            --card-white: #ffffff;
            --text-dark: #333333;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.2);
            --border-radius-card: 15px;
            --border-radius-sm: 8px;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll */
            user-select: none; /* Disable text selection */
            -webkit-user-select: none; /* For iOS */
            touch-action: pan-y; /* Allow vertical scrolling by default, but drag will override */
        }

        #game-container {
            background-color: #f7f7f7; /* Lighter background for the app frame */
            width: 100vw;
            height: 100vh;
            max-width: 430px; /* iPhone 16 Pro Max width approximation */
            max-height: 932px; /* iPhone 16 Pro Max height approximation */
            border-radius: 40px; /* App frame rounded corners */
            box-shadow: 0 10px 30px var(--shadow-medium);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keep content within rounded frame */
            position: relative;
        }

        /* Top Bar */
        #top-bar {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: var(--text-dark);
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px var(--shadow-light);
            z-index: 10;
        }

        #top-bar .arrow-back {
            font-size: 1.8rem;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Timeline Play Area */
        #timeline-wrapper {
            flex-grow: 1;
            padding: 20px 10px;
            overflow-y: auto; /* Scrollable timeline */
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #timeline-label {
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
            height: calc(100% - 40px); /* Adjust height to span timeline wrapper */
            justify-content: space-between;
            z-index: 1; /* Below cards but above timeline line */
        }

        #timeline-label::before {
            content: '';
            width: 2px;
            height: 100%;
            background-color: #ccc;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            z-index: -1; /* Behind labels */
        }

        #timeline-label span {
            writing-mode: vertical-lr;
            text-orientation: mixed;
            transform: rotate(180deg);
            padding: 5px 0;
        }

        #timeline {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Spacing between cards */
            width: 100%;
            max-width: 350px; /* Limit width of cards for better readability */
            padding-left: 50px; /* Make space for 'Before' label */
            padding-bottom: 20px;
            position: relative;
        }

        .timeline-card {
            background-color: var(--card-white);
            border-radius: var(--border-radius-card);
            box-shadow: 0 5px 15px var(--shadow-light);
            display: flex;
            align-items: center;
            width: 100%;
            cursor: default; /* Changed from grab for touch */
            transition: transform 0.3s ease-in-out, box-shadow 0.2s ease-in-out, opacity 0.3s ease-in-out, background-color 0.3s ease-in-out;
            position: relative;
            z-index: 5;
            min-height: 100px; /* Ensure consistent height */
        }

        .timeline-card.correct {
            border: 2px solid var(--card-green);
        }

        .timeline-card.incorrect {
            border: 2px solid var(--card-pink);
        }

        .timeline-card .card-image-container {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            margin: 10px;
            flex-shrink: 0;
            background-color: #eee; /* Placeholder for image loading */
        }

        .timeline-card .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .timeline-card .card-content {
            flex-grow: 1;
            padding: 10px 10px 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .timeline-card .card-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: var(--border-radius-sm);
            align-self: flex-start; /* Align date bubble to top-left of content */
        }

        .timeline-card .card-text {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.3;
        }

        .timeline-card .feedback-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white; /* Default color, will be overridden by classes */
            background-color: transparent;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1; /* For better icon centering */
        }

        .timeline-card .feedback-icon.show {
            opacity: 1;
        }

        .timeline-card .feedback-icon.correct-icon {
            background-color: var(--card-green);
        }

        .timeline-card .feedback-icon.incorrect-icon {
            background-color: var(--card-pink);
        }

        /* Card Holder Area */
        #card-holder-area {
            background-color: var(--card-white);
            padding: 15px 20px;
            box-shadow: 0 -5px 20px var(--shadow-light);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 140px; /* Ensure consistent height */
            position: relative;
        }

        #current-card {
            width: 90%;
            max-width: 320px; /* Similar to timeline card width */
            background-color: var(--card-white);
            border-radius: var(--border-radius-card);
            box-shadow: 0 5px 15px var(--shadow-medium);
            display: flex;
            align-items: center;
            cursor: grab; /* For desktop, for touch it's handled by JS */
            position: relative;
            z-index: 10;
            min-height: 100px;
            /* For touch drag */
            touch-action: none; /* Prevent browser scrolling when dragging this element */
            transition: none; /* Disable transition during active drag for smoothness */
        }

        #current-card.dragging {
            opacity: 0.8; /* Slight transparency when dragging */
            transform: scale(1.05);
            position: fixed; /* Lift from flow for touch drag */
            z-index: 1000; /* Ensure it's on top */
            box-shadow: 0 10px 30px var(--shadow-medium);
        }

        #current-card .card-image-container {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            margin: 10px;
            flex-shrink: 0;
            background-color: #eee;
        }

        #current-card .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #current-card .card-content {
            flex-grow: 1;
            padding: 10px 10px 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #current-card .card-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: #888; /* Hidden date is lighter */
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: var(--border-radius-sm);
            background-color: #f0f0f0;
            align-self: flex-start;
        }

        #current-card .card-text {
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.3;
        }

        /* Drag over indicator */
        .card-drop-indicator {
            height: 5px;
            background-color: #8bb4e1; /* Blue indicator */
            width: 80%;
            border-radius: 5px;
            margin: 0 auto; /* Center the indicator */
            transition: transform 0.2s ease-in-out, opacity 0.2s ease-in-out;
            opacity: 0;
            z-index: 1; /* Below cards */
        }

        .card-drop-indicator.show {
             opacity: 1;
             transform: scaleY(1.5); /* Make it slightly thicker when active */
        }


        /* Modal for Game End */
        #game-end-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        #game-end-modal.show {
            opacity: 1;
            visibility: visible;
        }

        #game-end-modal h2 {
            font-size: 2.2rem;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        #game-end-modal .trophy-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounceIn 0.8s ease-out forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        #game-end-modal p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
        }

        #game-end-modal button {
            background-color: var(--primary-bg);
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius-sm);
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 5px 15px var(--shadow-light);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        #game-end-modal button:active {
            transform: scale(0.98);
        }

        /* Helper classes */
        .hidden {
            display: none !important;
        }

        /* Font Awesome for icons */
        @import url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css");
    </style>
</head>
<body>

    <div id="game-container">
        <div id="top-bar">
            <span class="arrow-back"><i class="fas fa-arrow-left"></i></span>
            Timeline Challenge
        </div>

        <div id="timeline-wrapper">
            <div id="timeline-label">
                <span>Before</span>
                <span style="margin-top: auto; margin-bottom: 0;">After</span>
            </div>
            <div id="timeline">
                <!-- Placed cards and drop indicators will go here -->
            </div>
        </div>

        <div id="card-holder-area">
            <div id="current-card" draggable="false"> <!-- Set draggable to false for touch handling -->
                <div class="card-image-container">
                    <img src="" alt="Event Image">
                </div>
                <div class="card-content">
                    <div class="card-date">?</div>
                    <div class="card-text">Drag this card to the timeline!</div>
                </div>
            </div>
        </div>

        <div id="game-end-modal">
            <h2>Game Over!</h2>
            <div class="trophy-icon"></div>
            <p id="score-message"></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const cardsData = [
            // --- Easily modify card data here ---
            // Format: { id: uniqueId, image: 'URL_TO_IMAGE', text: 'Event Description', date: new Date('YYYY-MM-DD') }
            // Using images from Picsum.photos for reliable placeholders.
            {
                id: 'potatoes',
                image: 'https://picsum.photos/id/1080/150/150', // Farm / nature
                text: 'Potatoes brought to Europe',
                date: new Date('1550-01-01')
            },
            {
                id: 'french-fashion',
                image: 'https://picsum.photos/id/1083/150/150', // Portrait / historical feel
                text: 'French potato fashion (inspired by Marie Antoinette)',
                date: new Date('1770-01-01')
            },
            {
                id: 'mashed-potato-dance',
                image: 'https://picsum.photos/id/1042/150/150', // Dance / movement
                text: 'Mashed Potato dance craze',
                date: new Date('1960-01-01')
            },
            {
                id: 'snl-salad',
                image: 'https://picsum.photos/id/1063/150/150', // Food / dish
                text: 'Raisin potato salad on SNL',
                date: new Date('2018-01-01')
            },
            {
                id: 'mcdonalds-fries',
                image: 'https://picsum.photos/id/1084/150/150', // Food / snack
                text: "McDonald's adds fries to the menu",
                date: new Date('1949-01-01')
            },
            // Add more cards here following the format. Remember to use different IDs for picsum.photos for varied images:
            // Example:
            // {
            //     id: 'first-computer',
            //     image: 'https://picsum.photos/id/1050/150/150', // Technology/machine
            //     text: 'First electronic digital computer (ENIAC)',
            //     date: new Date('1945-02-15')
            // },
        ];
        // --- End of card data modification area ---

        const gameContainer = document.getElementById('game-container');
        const timeline = document.getElementById('timeline');
        const cardHolderArea = document.getElementById('card-holder-area');
        const currentCardElement = document.getElementById('current-card');
        const gameEndModal = document.getElementById('game-end-modal');
        const scoreMessage = document.getElementById('score-message');
        const trophyIcon = gameEndModal.querySelector('.trophy-icon');
        const timelineWrapper = document.getElementById('timeline-wrapper'); // Added for scroll and position calculation

        let unplacedCards = [];
        let placedCards = []; // Stores objects: { cardData: {...}, element: DOM_ELEMENT, isCorrect: boolean, isFixed: boolean }
        let currentCard = null;
        let wrongAnswers = 0;
        let dragTargetIndex = -1; // The index in placedCards array where the current card would be inserted

        // Touch Drag Specific Variables
        let isDragging = false;
        let startX, startY;
        let initialOffsetX, initialOffsetY; // Offset from touch point to card's top-left corner

        // Helper to format date for display
        function formatDate(date) {
            return date.toLocaleString('en-US', { year: 'numeric', month: 'short' });
        }

        // Shuffles an array (Fisher-Yates algorithm)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initializeGame() {
            // Reset state
            unplacedCards = [...cardsData];
            shuffleArray(unplacedCards); // Shuffle the cards to be placed
            placedCards = [];
            wrongAnswers = 0;
            dragTargetIndex = -1;

            timeline.innerHTML = ''; // Clear timeline
            renderDropIndicators(); // Add initial indicator
            gameEndModal.classList.remove('show');

            loadNextCard();
        }

        function createCardElement(cardData) {
            const cardEl = document.createElement('div');
            cardEl.classList.add('timeline-card');
            cardEl.dataset.id = cardData.id;

            cardEl.innerHTML = `
                <div class="card-image-container">
                    <img src="${cardData.image}" alt="${cardData.text}">
                </div>
                <div class="card-content">
                    <div class="card-date hidden-date" style="background-color: ${getCardColor(cardData.id)}; color: var(--text-dark);">?</div>
                    <div class="card-text">${cardData.text}</div>
                </div>
                <div class="feedback-icon correct-icon"><i class="fas fa-check"></i></div>
                <div class="feedback-icon incorrect-icon"><i class="fas fa-times"></i></div>
            `;
            return cardEl;
        }

        // Assign colors based on initial mock-up for consistency
        function getCardColor(id) {
            switch (id) {
                case 'potatoes': return var_color('--card-purple');
                case 'french-fashion': return var_color('--card-yellow');
                case 'mashed-potato-dance': return var_color('--card-green');
                case 'snl-salad': return var_color('--card-pink');
                case 'mcdonalds-fries': return 'lightcoral'; // A new color if needed
                default: return '#cccccc'; // Default for new cards
            }
        }

        function var_color(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName);
        }

        function loadNextCard() {
            if (unplacedCards.length === 0) {
                endGame();
                return;
            }

            currentCard = unplacedCards.shift(); // Get the next card
            currentCardElement.dataset.id = currentCard.id;
            currentCardElement.querySelector('img').src = currentCard.image;
            currentCardElement.querySelector('.card-text').textContent = currentCard.text;
            currentCardElement.querySelector('.card-date').textContent = '?';
            currentCardElement.querySelector('.card-date').style.backgroundColor = getCardColor(currentCard.id);
            currentCardElement.classList.remove('hidden'); // Ensure card is visible
            currentCardElement.style.transform = 'none'; // Reset transform from previous drag
            currentCardElement.style.top = 'auto';
            currentCardElement.style.left = 'auto';
            currentCardElement.style.position = 'relative'; // Ensure it's back in flow
        }

        // --- Desktop Drag & Drop (fallback, might be disabled for mobile-first touch) ---
        // Keeping these listeners, but `draggable="false"` on #current-card means they won't fire for it.
        // They are mostly relevant if we had draggable elements *within* the timeline that could be reordered.
        function handleDesktopDragStart(e) {
            e.dataTransfer.setData('text/plain', currentCard.id);
            e.dataTransfer.effectAllowed = 'move';
            currentCardElement.classList.add('dragging');

            hideAllDropIndicators();
        }

        function handleDesktopDragEnd(e) {
            currentCardElement.classList.remove('dragging');
            hideAllDropIndicators();
            dragTargetIndex = -1;
        }

        function handleDesktopDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';

            const target = e.target.closest('.timeline-card, .card-drop-indicator');
            if (!target) {
                dragTargetIndex = -1;
                hideAllDropIndicators();
                return;
            }

            hideAllDropIndicators();

            let newTargetIndex = -1;
            if (target.classList.contains('timeline-card')) {
                const rect = target.getBoundingClientRect();
                const midPoint = rect.top + rect.height / 2;
                const targetCardId = target.dataset.id;
                const targetCardPlacedIndex = placedCards.findIndex(pc => pc.cardData.id === targetCardId);

                if (e.clientY < midPoint) {
                    newTargetIndex = targetCardPlacedIndex;
                } else {
                    newTargetIndex = targetCardPlacedIndex + 1;
                }
            } else if (target.classList.contains('card-drop-indicator')) {
                newTargetIndex = parseInt(target.dataset.index);
            }

            if (newTargetIndex !== -1) {
                const indicator = timeline.querySelector(`.card-drop-indicator[data-index="${newTargetIndex}"]`);
                if (indicator) {
                    indicator.classList.add('show');
                }
                dragTargetIndex = newTargetIndex;
            } else {
                dragTargetIndex = -1;
            }
        }

        function handleDesktopDrop(e) {
            e.preventDefault();
            hideAllDropIndicators();

            if (dragTargetIndex === -1) {
                return;
            }

            placeCard(currentCard, dragTargetIndex);
            dragTargetIndex = -1;
        }


        // --- Touch Drag & Drop Implementation ---
        currentCardElement.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) { // Only handle single touch
                e.preventDefault(); // Prevent scrolling/zooming while dragging
                isDragging = true;
                currentCardElement.classList.add('dragging');

                const touch = e.touches[0];
                const rect = currentCardElement.getBoundingClientRect();
                
                // Calculate offset from touch point to card's top-left corner
                initialOffsetX = touch.clientX - rect.left;
                initialOffsetY = touch.clientY - rect.top;

                // Set initial position (relative to viewport for fixed positioning)
                currentCardElement.style.left = (touch.clientX - initialOffsetX) + 'px';
                currentCardElement.style.top = (touch.clientY - initialOffsetY) + 'px';
                currentCardElement.style.position = 'fixed';

                hideAllDropIndicators();
            }
        }, { passive: false });

        currentCardElement.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault(); // Prevent scrolling
                const touch = e.touches[0];

                // Update card position
                currentCardElement.style.left = (touch.clientX - initialOffsetX) + 'px';
                currentCardElement.style.top = (touch.clientY - initialOffsetY) + 'px';

                // Simulate drag over detection
                const timelineRect = timeline.getBoundingClientRect();
                // Check if touch is within timeline bounds
                if (touch.clientY > timelineRect.top && touch.clientY < timelineRect.bottom &&
                    touch.clientX > timelineRect.left && touch.clientX < timelineRect.right) {

                    hideAllDropIndicators();
                    let bestTargetIndex = -1;
                    let minDistance = Infinity;

                    const indicators = Array.from(timeline.querySelectorAll('.card-drop-indicator'));
                    const timelineCards = Array.from(timeline.querySelectorAll('.timeline-card'));

                    // Check between existing cards/indicators
                    indicators.forEach(indicator => {
                        const indicatorRect = indicator.getBoundingClientRect();
                        const indicatorMidY = indicatorRect.top + indicatorRect.height / 2;
                        const distance = Math.abs(touch.clientY - indicatorMidY);

                        // If touch is close enough to an indicator
                        if (distance < minDistance && touch.clientY > indicatorRect.top && touch.clientY < indicatorRect.bottom) {
                            minDistance = distance;
                            bestTargetIndex = parseInt(indicator.dataset.index);
                        }
                    });

                    // If no indicator was a clear target, check relative to existing cards for top/bottom
                    if (bestTargetIndex === -1 && timelineCards.length > 0) {
                        timelineCards.forEach((card, index) => {
                            const cardRect = card.getBoundingClientRect();
                            const cardMidY = cardRect.top + cardRect.height / 2;

                            if (touch.clientY < cardMidY && Math.abs(touch.clientY - cardRect.top) < 30) { // Near top of card
                                bestTargetIndex = index; // Before this card
                            } else if (touch.clientY > cardMidY && Math.abs(touch.clientY - cardRect.bottom) < 30) { // Near bottom of card
                                bestTargetIndex = index + 1; // After this card
                            }
                        });

                        // Special case: if timeline is empty or dragging to very top/bottom
                        if (timelineCards.length === 0 && touch.clientY < timelineRect.top + 50) { // Near top of empty timeline
                             bestTargetIndex = 0;
                        } else if (timelineCards.length > 0 && touch.clientY > timelineRect.bottom - 50) { // Near bottom of last card
                            bestTargetIndex = timelineCards.length;
                        }
                    } else if (timelineCards.length === 0 && touch.clientY > timelineRect.top && touch.clientY < timelineRect.bottom) {
                        // If timeline is empty and dragging over the timeline area
                         bestTargetIndex = 0;
                    }


                    if (bestTargetIndex !== -1) {
                        const activeIndicator = timeline.querySelector(`.card-drop-indicator[data-index="${bestTargetIndex}"]`);
                        if (activeIndicator) {
                            activeIndicator.classList.add('show');
                        }
                        dragTargetIndex = bestTargetIndex;
                    } else {
                        dragTargetIndex = -1; // No valid drop target found
                    }

                } else {
                    // Touch is outside timeline, no drop target
                    hideAllDropIndicators();
                    dragTargetIndex = -1;
                }
            }
        }, { passive: false });

        currentCardElement.addEventListener('touchend', (e) => {
            if (isDragging) {
                isDragging = false;
                currentCardElement.classList.remove('dragging');
                
                // Reset styling after drag
                currentCardElement.style.position = 'relative'; // Back to normal flow for next card
                currentCardElement.style.left = 'auto';
                currentCardElement.style.top = 'auto';
                currentCardElement.style.transform = 'none';

                hideAllDropIndicators();

                if (dragTargetIndex !== -1) {
                    placeCard(currentCard, dragTargetIndex);
                } else {
                    // If dropped outside a valid target, put card back in holder
                    currentCardElement.classList.remove('hidden'); // Make it visible again
                    // Optionally, add a "snap back" animation here
                }
                dragTargetIndex = -1; // Reset
            }
        });


        function hideAllDropIndicators() {
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => {
                indicator.classList.remove('show');
            });
        }

        function placeCard(cardData, insertionIndex) {
            const newPlacedCard = {
                cardData: cardData,
                element: createCardElement(cardData),
                isCorrect: false,
                isFixed: false
            };

            // Remove the card from the card holder
            currentCardElement.classList.add('hidden');

            // Insert into the DOM immediately
            insertCardElementIntoTimeline(newPlacedCard.element, insertionIndex);

            // Temporarily insert into placedCards array to check relative order
            const tempPlacedCards = [...placedCards];
            tempPlacedCards.splice(insertionIndex, 0, newPlacedCard);

            // Check correctness of *all* cards
            let allCorrect = true;
            for (let i = 0; i < tempPlacedCards.length; i++) {
                const card = tempPlacedCards[i];
                let cardCorrect = true;

                // Check previous card
                if (i > 0 && tempPlacedCards[i-1].cardData.date.getTime() > card.cardData.date.getTime()) {
                    cardCorrect = false;
                }
                // Check next card
                if (i < tempPlacedCards.length - 1 && tempPlacedCards[i+1].cardData.date.getTime() < card.cardData.date.getTime()) {
                    cardCorrect = false;
                }
                card.isCorrect = cardCorrect;
                if (!cardCorrect) allCorrect = false;
            }

            if (newPlacedCard.isCorrect) {
                // If the new card's placement is correct relative to its immediate neighbors
                newPlacedCard.element.classList.add('correct');
                newPlacedCard.element.querySelector('.feedback-icon.correct-icon').classList.add('show');
                newPlacedCard.isFixed = true; // Fix correct cards
            } else {
                newPlacedCard.element.classList.add('incorrect');
                newPlacedCard.element.querySelector('.feedback-icon.incorrect-icon').classList.add('show');
                wrongAnswers++;
            }

            // Reveal date for the newly placed card
            newPlacedCard.element.querySelector('.card-date').textContent = formatDate(cardData.date);

            // Update the main placedCards array
            placedCards = tempPlacedCards;

            // If any card is incorrect, resort and re-render the timeline
            if (!allCorrect) {
                // Find the truly sorted position
                const correctlySortedCards = [...placedCards].sort((a,b) => a.cardData.date.getTime() - b.cardData.date.getTime());
                const correctSortedIndex = correctlySortedCards.findIndex(pc => pc.cardData.id === newPlacedCard.cardData.id);

                const currentItemIndex = placedCards.indexOf(newPlacedCard);
                
                // If the card is not in its final sorted position, animate it there
                if (currentItemIndex !== correctSortedIndex) {
                    // Update the array first
                    const [movedCard] = placedCards.splice(currentItemIndex, 1);
                    placedCards.splice(correctSortedIndex, 0, movedCard);

                    // Re-render the entire timeline to reflect the new order with animation
                    // This is simpler than animating a single card for now,
                    // but a more advanced implementation would animate only the moved card.
                    rebuildTimelineDOM();
                }
            }

            // After placement, always re-render drop indicators
            renderDropIndicators();

            // Load next card after a short delay for visual feedback
            setTimeout(loadNextCard, 1000);
        }

        function insertCardElementIntoTimeline(cardElement, index) {
            const dropIndicators = timeline.querySelectorAll('.card-drop-indicator');
            if (index >= dropIndicators.length) {
                timeline.appendChild(cardElement);
            } else {
                timeline.insertBefore(cardElement, dropIndicators[index]);
            }
        }

        // Function to rebuild the timeline DOM based on the placedCards array
        function rebuildTimelineDOM() {
            timeline.innerHTML = ''; // Clear current DOM
            placedCards.forEach((placedCard, index) => {
                timeline.appendChild(placedCard.element);
            });
            renderDropIndicators();
        }


        function renderDropIndicators() {
            // Remove existing indicators
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => indicator.remove());

            // Add new indicators based on current placedCards length
            for (let i = 0; i <= placedCards.length; i++) {
                const indicator = document.createElement('div');
                indicator.classList.add('card-drop-indicator');
                indicator.dataset.index = i;
                timeline.insertBefore(indicator, (i < placedCards.length ? placedCards[i].element : null));
            }
            // Ensure the first indicator is always visible to hint where to drop first card
            if (placedCards.length === 0) {
                 timeline.querySelector('.card-drop-indicator[data-index="0"]').classList.add('show');
            }
        }


        function endGame() {
            let resultText = '';
            let trophyClass = '';

            if (wrongAnswers === 0) {
                resultText = "Amazing! You got a Gold Star! Your knowledge of history is impeccable!";
                trophyClass = 'fas fa-medal gold'; // Assuming gold icon in FA
                trophyIcon.style.color = 'gold';
            } else if (wrongAnswers <= 1) {
                resultText = "Excellent! You earned a Silver Star! Just one slip-up, well done!";
                trophyClass = 'fas fa-medal silver';
                trophyIcon.style.color = 'silver';
            } else if (wrongAnswers <= 2) {
                resultText = "Good Job! You got a Bronze Star! A few corrections, but you persevered!";
                trophyClass = 'fas fa-medal bronze';
                trophyIcon.style.color = '#cd7f32'; /* Bronze color */
            } else {
                resultText = `You completed the timeline with ${wrongAnswers} wrong answers. Keep practicing!`;
                trophyClass = 'fas fa-star';
                trophyIcon.style.color = '#888';
            }

            scoreMessage.textContent = resultText;
            trophyIcon.className = `trophy-icon ${trophyClass}`;
            gameEndModal.classList.add('show');
        }

        function restartGame() {
            initializeGame();
        }

        // --- Event Listeners for Desktop Drag (still present but less priority for touch focus) ---
        // currentCardElement.addEventListener('dragstart', handleDesktopDragStart); // Disabled by draggable="false"
        // currentCardElement.addEventListener('dragend', handleDesktopDragEnd);    // Disabled by draggable="false"

        timeline.addEventListener('dragover', handleDesktopDragOver);
        timeline.addEventListener('dragleave', () => {
             hideAllDropIndicators();
             dragTargetIndex = -1;
        });
        timeline.addEventListener('drop', handleDesktopDrop);

        // Initial setup
        initializeGame();
        renderDropIndicators(); // Render initial indicators even before first card is placed

        // Prevent body scroll on touch
        document.body.addEventListener('touchmove', (e) => {
            // Only prevent if not dragging the card and not naturally scrolling timeline wrapper
            if (!isDragging && !e.target.closest('#timeline-wrapper')) {
                e.preventDefault();
            }
        }, { passive: false });

    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Anniversary!</title>
    <style>
        :root {
            --primary-bg: #ffe45e;
            --game-bg: #f7f7f7;
            --card-green: #90d8a5;
            --card-pink: #f4a5b4;
            --card-white: #ffffff;
            --text-dark: #1a1a1a;
            --shadow: rgba(0, 0, 0, 0.1);
            --app-height: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: var(--app-height);
            overflow: hidden; user-select: none;
        }

        #game-container {
            background-color: var(--game-bg);
            width: 100%; max-width: 430px;
            height: 100%;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* --- FIXED TIMELINE GUTTER --- */
        #timeline-gutter {
            position: absolute;
            left: 0; top: 60px; bottom: 140px;
            width: 55px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 40px 0;
            pointer-events: none;
            z-index: 10;
        }

        .gutter-line {
            position: absolute;
            top: 60px; bottom: 60px;
            width: 2px;
            background: #ddd;
            left: 50%; transform: translateX(-50%);
        }

        .gutter-label {
            font-size: 0.75rem; font-weight: 900; color: #bbb;
            text-transform: uppercase; letter-spacing: 1.5px;
            writing-mode: vertical-lr; transform: rotate(180deg);
            background: var(--game-bg); padding: 10px 0;
            z-index: 2;
        }

        /* --- PLAY AREA --- */
        #timeline-wrapper {
            flex-grow: 1;
            padding: 20px 15px 20px 70px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        #timeline {
            display: flex; flex-direction: column;
            width: 100%;
            position: relative;
        }

        .card-slot {
            overflow: visible;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .timeline-card {
            background: var(--card-white);
            border-radius: 18px;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex; align-items: center;
            width: 100%; height: 110px; /* Height increased slightly for full date */
            border: 2px solid transparent;
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .card-img {
            width: 85px; height: 85px;
            border-radius: 12px; margin: 10px;
            object-fit: cover; flex-shrink: 0;
            background: #eee;
        }

        .card-content { flex-grow: 1; padding-right: 15px; overflow: hidden; }

        .date-badge {
            display: inline-block;
            padding: 4px 10px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 800;
            background: #e5e5e5; margin-bottom: 4px;
            white-space: nowrap;
        }

        .card-text {
            font-size: 0.9rem; color: #333; margin: 0;
            line-height: 1.2; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* --- BOTTOM TRAY --- */
        #tray {
            height: 150px; background: white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 -5px 25px var(--shadow);
            z-index: 100; padding: 0 20px;
        }

        #current-card {
            width: 100%; max-width: 340px; height: 110px;
            background: white; border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex; align-items: center;
            touch-action: none; position: relative;
        }

        .dragging { opacity: 0.9; transform: scale(1.05); z-index: 5000; position: fixed !important; pointer-events: none; }

        .elevated {
            z-index: 9999 !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
        }

        /* --- FEEDBACK --- */
        .card-drop-indicator { height: 0px; width: 100%; transition: height 0.3s; position: relative; }
        .card-drop-indicator.show { height: 10px; }
        .card-drop-indicator::after {
            content: ''; position: absolute; top: 3px; left: 0; right: 0; height: 4px;
            background: #8bb4e1; border-radius: 2px; opacity: 0;
        }
        .card-drop-indicator.show::after { opacity: 1; }

        .correct { border-color: var(--card-green); }
        .correct .date-badge { background: var(--card-green); }
        .incorrect { border-color: var(--card-pink); }
        .incorrect .date-badge { background: var(--card-pink); }

        /* --- END GAME SCREEN --- */
        #end-modal {
            position: fixed; inset: 0;
            background: #f1f0e8; z-index: 10000;
            display: none; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 60px 40px; text-align: center;
        }

        #end-anniversary { font-size: 1.6rem; font-weight: 800; color: #333; margin-bottom: 40px; }

        .medal-box {
            width: 220px; height: 260px;
            position: relative; display: flex; flex-direction: column; align-items: center;
            margin-bottom: 30px;
        }

        .ribbon {
            width: 80px; height: 100px;
            background: #f26d21;
            background-image: linear-gradient(90deg, transparent 25%, white 25%, white 40%, transparent 40%, transparent 60%, white 60%, white 75%, transparent 75%);
            position: absolute; top: 0; z-index: 1;
            clip-path: polygon(15% 0, 85% 0, 100% 100%, 50% 85%, 0 100%);
            border: 4px solid #1a1a1a;
        }
        .ribbon-silver { background-color: #4caf50; }

        .medal-body {
            width: 160px; height: 160px;
            border-radius: 50%; border: 8px solid #1a1a1a;
            position: absolute; bottom: 0; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
        }

        .gold-body { background: #fbb03b; }
        .silver-body { background: #e6e6e6; }
        .bronze-body { background: #d78150; }

        .medal-body::before {
            content: ''; position: absolute; width: 120px; height: 120px;
            border-radius: 50%; border: 4px solid rgba(0,0,0,0.1);
        }

        .medal-number { font-size: 6rem; font-weight: 900; color: #1a1a1a; z-index: 3; margin-top: -10px; opacity: 0.8; }

        .laurel {
            position: absolute; width: 30px; height: 60px;
            border-left: 4px solid rgba(0,0,0,0.1); border-bottom: 4px solid rgba(0,0,0,0.1);
            border-radius: 0 0 0 20px; bottom: 35px; left: 30px; transform: rotate(-15deg);
        }
        .laurel-right { left: auto; right: 30px; transform: scaleX(-1) rotate(-15deg); }

        .star-shape {
            width: 160px; height: 160px;
            background: #ffc107; border: 8px solid #1a1a1a;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: #1a1a1a; font-weight: 900;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
        }

        #end-status { font-size: 2.5rem; font-weight: 900; color: #1a1a1a; margin-bottom: 10px; }
        #accuracy-stats { font-size: 1.1rem; color: #666; font-weight: 600; margin-bottom: 50px; }

        .btn-restart {
            padding: 18px 60px; border-radius: 40px;
            border: 4px solid #1a1a1a; background: white;
            color: #1a1a1a; font-size: 1.2rem; font-weight: 900;
            cursor: pointer; box-shadow: 4px 4px 0px #1a1a1a;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-bar" style="padding: 20px; font-weight: 800; border-bottom: 1px solid #eee;">
        Timeline Challenge
    </div>

    <div id="timeline-gutter">
        <span class="gutter-label">Before</span>
        <div class="gutter-line"></div>
        <span class="gutter-label">After</span>
    </div>

    <div id="timeline-wrapper">
        <div id="timeline"></div>
    </div>

    <div id="tray">
        <div id="current-card">
            <img src="" class="card-img">
            <div class="card-content">
                <span class="date-badge">?</span>
                <p class="card-text"></p>
            </div>
        </div>
    </div>

    <div id="end-modal">
        <div id="end-anniversary">Happy Anniversary</div>
        <div class="medal-box" id="medal-slot"></div>
        <div id="end-status">Perfect!</div>
        <div id="accuracy-stats">Accuracy: 100%</div>
        <button class="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    // JS Months are 0-indexed: 0 = Jan, 1 = Feb, etc.
    const cardsData = [
        { id: 1, date: new Date(2025, 3, 1), text: "Yet Another Lighthouse", img: "Apr25.HEIC" },
        { id: 2, date: new Date(2025, 4, 1), text: "Moon Photography Contest", img: "May25.HEIC" },
        { id: 3, date: new Date(2025, 5, 1), text: "Feast Time!", img: "Jun25.HEIC" },
        { id: 4, date: new Date(2025, 6, 1), text: "Hot Airless Balloon", img: "Jul25.HEIC" },
        { id: 5, date: new Date(2025, 7, 1), text: "Back In the BBQ Days", img: "Aug25.HEIC" },
        { id: 6, date: new Date(2025, 8, 1), text: "Lady And Gentleman", img: "Sep25.HEIC" },
        { id: 7, date: new Date(2025, 9, 1), text: "BeeLoved", img: "Oct25.HEIC" },
        { id: 8, date: new Date(2025, 10, 1), text: "Yet Another Flight Through The Mountains", img: "Nov25.HEIC" },
        { id: 9, date: new Date(2025, 11, 1), text: "Freezing On The Balcony", img: "Dec25.HEIC" },
        { id: 10, date: new Date(2026, 0, 1), text: "Do You Wanna Build A Snowman", img: "Jan26.HEIC" },
        { id: 11, date: new Date(2026, 1, 1), text: "Date Decor Date", img: "Feb26.HEIC" },
        { id: 12, date: new Date(2026, 2, 1), text: "Nth Fireworks", img: "Mar26.HEIC" }
    ];

    let unplaced = [];
    let placed = [];
    let mistakes = 0;
    let totalRounds = 0;
    let isDragging = false;
    let currentDragIndex = -1;
    let initialX, initialY;

    const trayCard = document.getElementById('current-card');
    const timeline = document.getElementById('timeline');
    const wrapper = document.getElementById('timeline-wrapper');

    function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }
    window.addEventListener('resize', setAppHeight);
    setAppHeight();

    function formatDate(date) {
        // Uses 'en-GB' locale to get the Day Month Year order automatically
        return date.toLocaleDateString('en-GB', { 
            day: 'numeric', 
            month: 'long', 
            year: 'numeric' 
        });
    }

    function init() {
        unplaced = [...cardsData].sort(() => Math.random() - 0.5);
        totalRounds = unplaced.length - 1; 
        const seed = unplaced.shift();
        const seedEl = createCardEl(seed);
        seedEl.classList.add('correct');
        placed.push({ data: seed, el: seedEl });
        renderTimeline(false);
        nextCard();
    }

    function renderTimeline(animate = true) {
        timeline.innerHTML = '';
        placed.forEach((item, i) => {
            const ind = document.createElement('div');
            ind.className = 'card-drop-indicator';
            ind.dataset.index = i;
            timeline.appendChild(ind);
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.appendChild(item.el);
            if (animate && item.isNew) {
                slot.style.height = '0px';
                requestAnimationFrame(() => slot.style.height = '125px');
                item.isNew = false;
            } else { slot.style.height = '125px'; }
            timeline.appendChild(slot);
        });
        const lastInd = document.createElement('div');
        lastInd.className = 'card-drop-indicator';
        lastInd.dataset.index = placed.length;
        timeline.appendChild(lastInd);
    }

    function nextCard() {
        if (unplaced.length === 0) return endGame();
        const data = unplaced.shift();
        trayCard.dataset.id = data.id;
        trayCard.querySelector('img').src = data.img;
        trayCard.querySelector('.card-text').textContent = data.text;
        trayCard.style.visibility = 'visible';
    }

    trayCard.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = trayCard.getBoundingClientRect();
        initialX = touch.clientX - rect.left;
        initialY = touch.clientY - rect.top;
        trayCard.classList.add('dragging');
        trayCard.style.width = rect.width + 'px';
    });

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        trayCard.style.left = (touch.clientX - initialX) + 'px';
        trayCard.style.top = (touch.clientY - initialY) + 'px';
        const wrapperRect = wrapper.getBoundingClientRect();
        if (touch.clientY < wrapperRect.top + 70) wrapper.scrollTop -= 12;
        if (touch.clientY > wrapperRect.bottom - 70) wrapper.scrollTop += 12;
        let closestInd = -1; let minDist = Infinity;
        document.querySelectorAll('.card-drop-indicator').forEach(ind => {
            const rect = ind.getBoundingClientRect();
            const d = Math.abs(touch.clientY - (rect.top + rect.height / 2));
            ind.classList.remove('show');
            if (d < minDist && d < 80) { minDist = d; closestInd = parseInt(ind.dataset.index); }
        });
        currentDragIndex = closestInd;
        if (closestInd !== -1) document.querySelector(`.card-drop-indicator[data-index="${closestInd}"]`).classList.add('show');
    }, { passive: false });

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        trayCard.classList.remove('dragging');
        trayCard.style.position = 'relative';
        trayCard.style.top = 'auto'; trayCard.style.left = 'auto';
        if (currentDragIndex !== -1) handlePlacement(currentDragIndex);
        else trayCard.style.visibility = 'visible';
    });

    async function handlePlacement(index) {
        const data = cardsData.find(c => c.id == trayCard.dataset.id);
        const cardEl = createCardEl(data);
        trayCard.style.visibility = 'hidden';
        const temp = [...placed];
        temp.splice(index, 0, { data });
        const correct = (index === 0 || temp[index-1].data.date <= data.date) && 
                        (index === temp.length - 1 || data.date <= temp[index+1].data.date);
        if (correct) {
            cardEl.classList.add('correct');
            placed.splice(index, 0, { data, el: cardEl, isNew: true });
            renderTimeline(true);
            setTimeout(nextCard, 800);
        } else {
            mistakes++; cardEl.classList.add('incorrect');
            const indicators = document.querySelectorAll('.card-drop-indicator');
            const dummySlot = document.createElement('div');
            dummySlot.className = 'card-slot'; dummySlot.style.height = '125px';
            dummySlot.appendChild(cardEl);
            timeline.insertBefore(dummySlot, indicators[index]);
            await new Promise(r => setTimeout(r, 1200));
            const firstRect = cardEl.getBoundingClientRect();
            placed.push({ data, el: cardEl });
            placed.sort((a, b) => a.data.date - b.data.date);
            renderTimeline(false);
            const lastRect = cardEl.getBoundingClientRect();
            const deltaY = firstRect.top - lastRect.top;
            let startTime = null; const duration = 1800;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = (timestamp - startTime) / duration;
                if (progress < 1) { cardEl.scrollIntoView({ block: 'center' }); requestAnimationFrame(step); }
            }
            cardEl.classList.add('elevated');
            cardEl.style.transition = 'none'; cardEl.style.transform = `translateY(${deltaY}px)`;
            cardEl.offsetHeight; 
            cardEl.style.transition = 'transform 1.8s cubic-bezier(0.45, 0, 0.55, 1)';
            cardEl.style.transform = 'translateY(0)';
            requestAnimationFrame(step);
            await new Promise(r => setTimeout(r, 1900));
            cardEl.classList.remove('elevated');
            nextCard();
        }
    }

    function createCardEl(data) {
        const div = document.createElement('div');
        div.className = 'timeline-card';
        div.innerHTML = `
            <img src="${data.img}" class="card-img">
            <div class="card-content">
                <span class="date-badge">${formatDate(data.date)}</span>
                <p class="card-text">${data.text}</p>
            </div>
        `;
        return div;
    }

    function endGame() {
        const modal = document.getElementById('end-modal');
        const slot = document.getElementById('medal-slot');
        const statusText = document.getElementById('end-status');
        const stats = document.getElementById('accuracy-stats');
        let medalClass = 'gold-body'; let ribbonClass = ''; let number = '1'; let status = 'Perfect!';
        if (mistakes <= 1) { medalClass = 'gold-body'; number = '1'; status = 'Perfect!'; }
        else if (mistakes <= 3) { medalClass = 'silver-body'; ribbonClass = 'ribbon-silver'; number = '2'; status = 'Great Job!'; }
        else if (mistakes <= 5) { medalClass = 'bronze-body'; ribbonClass = 'ribbon-silver'; number = '3'; status = 'Nice!'; }
        else {
            slot.innerHTML = `<div class="star-shape">4</div>`;
            statusText.textContent = "Keep Going!";
            stats.textContent = `Mistakes: ${mistakes}`;
            modal.style.display = 'flex'; return;
        }
        slot.innerHTML = `
            <div class="ribbon ${ribbonClass}"></div>
            <div class="medal-body ${medalClass}">
                <div class="laurel"></div><div class="laurel laurel-right"></div>
                <div class="medal-number">${number}</div>
            </div>
        `;
        statusText.textContent = status;
        const accuracy = Math.round(((totalRounds - mistakes) / totalRounds) * 100);
        stats.textContent = `Accuracy: ${Math.max(0, accuracy)}%`;
        modal.style.display = 'flex';
    }

    init();
</script>
</body>
</html>

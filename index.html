<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Anniversary!</title>
    <style>
        :root {
            --primary-bg: #ffe45e;
            --game-bg: #f7f7f7;
            --card-green: #90d8a5;
            --card-pink: #f4a5b4;
            --card-white: #ffffff;
            --text-dark: #333333;
            --shadow: rgba(0, 0, 0, 0.1);
            --app-height: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--game-bg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: var(--app-height);
            overflow: hidden; user-select: none;
        }

        #game-container {
            background-color: var(--game-bg);
            width: 100%; max-width: 430px;
            height: 100%;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* --- FIXED TIMELINE GUTTER --- */
        #timeline-gutter {
            position: absolute;
            left: 0; top: 60px; bottom: 140px; /* Aligned with play area */
            width: 50px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 20px 0;
            pointer-events: none;
            z-index: 10;
        }

        .gutter-line {
            position: absolute;
            top: 40px; bottom: 40px;
            width: 2px;
            background: #ccc;
            left: 50%; transform: translateX(-50%);
        }

        .gutter-label {
            font-size: 0.75rem; font-weight: bold; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            writing-mode: vertical-lr; transform: rotate(180deg);
            background: var(--game-bg); padding: 5px 0;
            z-index: 2;
        }

        /* --- PLAY AREA --- */
        #timeline-wrapper {
            flex-grow: 1;
            padding: 20px 10px 20px 60px; /* Offset for the gutter */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        #timeline {
            display: flex; flex-direction: column;
            gap: 15px; width: 100%;
        }

        .timeline-card {
            background: var(--card-white);
            border-radius: 15px;
            box-shadow: 0 4px 10px var(--shadow);
            display: flex; align-items: center;
            width: 100%; min-height: 90px;
            border: 2px solid transparent;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
        }

        .card-img {
            width: 70px; height: 70px;
            border-radius: 10px; margin: 10px;
            object-fit: cover; flex-shrink: 0;
        }

        .card-content { flex-grow: 1; padding-right: 15px; }

        .date-badge {
            display: inline-block;
            padding: 3px 8px; border-radius: 5px;
            font-size: 0.75rem; font-weight: bold;
            background: #eee; margin-bottom: 4px;
        }

        .card-text {
            font-size: 0.9rem; color: #444; margin: 0;
            line-height: 1.2;
        }

        /* --- BOTTOM TRAY --- */
        #tray {
            height: 140px; background: white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 -5px 15px var(--shadow);
            z-index: 20; padding: 0 20px;
        }

        #current-card {
            width: 100%; max-width: 320px; height: 100px;
            background: white; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            display: flex; align-items: center;
            touch-action: none; position: relative;
        }

        #current-card .card-text {
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .dragging { opacity: 0.9; transform: scale(1.05); z-index: 1000; position: fixed !important; }

        /* --- FEEDBACK --- */
        .card-drop-indicator {
            height: 4px; background: #8bb4e1;
            width: 90%; margin: 0 auto; border-radius: 2px;
            opacity: 0; transition: opacity 0.2s;
        }
        .card-drop-indicator.show { opacity: 1; }

        .correct { border-color: var(--card-green); }
        .correct .date-badge { background: var(--card-green); }
        .incorrect { border-color: var(--card-pink); }
        .incorrect .date-badge { background: var(--card-pink); }

        /* --- END GAME SCREEN --- */
        #end-modal {
            position: fixed; inset: 0;
            background: #fdfaf3; z-index: 2000;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }

        .medal-wrapper { position: relative; margin-bottom: 40px; }

        /* CSS Medal Shape */
        .medal-ribbon {
            width: 60px; height: 100px;
            background: #e35d5d; position: absolute;
            top: -20px; left: 50%; transform: translateX(-50%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 85%, 0% 100%);
            z-index: 1;
        }

        .medal-circle {
            width: 120px; height: 120px;
            border-radius: 50%; border: 6px solid #fff;
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .gold-medal { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .silver-medal { background: linear-gradient(135deg, #e0e0e0, #888); }
        .bronze-medal { background: linear-gradient(135deg, #cd7f32, #804a16); }
        
        /* Star Shape for 4+ */
        .star-shape {
            width: 130px; height: 130px;
            background: #ffc107;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: white; font-weight: 900;
        }

        h2 { font-size: 2rem; margin: 10px 0; color: var(--text-dark); }
        .stats { font-size: 1.1rem; color: #666; margin-bottom: 40px; }

        .btn-restart {
            padding: 15px 40px; border-radius: 30px;
            border: none; background: var(--text-dark);
            color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: transform 0.2s;
        }
        .btn-restart:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-bar" style="padding: 15px 20px; font-weight: bold; border-bottom: 1px solid #ddd;">
        Timeline Challenge
    </div>

    <div id="timeline-gutter">
        <span class="gutter-label">Before</span>
        <div class="gutter-line"></div>
        <span class="gutter-label">After</span>
    </div>

    <div id="timeline-wrapper">
        <div id="timeline"></div>
    </div>

    <div id="tray">
        <div id="current-card">
            <img src="" class="card-img">
            <div class="card-content">
                <span class="date-badge">?</span>
                <p class="card-text"></p>
            </div>
        </div>
    </div>

    <div id="end-modal">
        <h1 id="anniversary-msg" style="margin-bottom: 10px;">Happy Anniversary!</h1>
        <div class="medal-wrapper" id="medal-slot"></div>
        <h2 id="rank-name">Gold Rank</h2>
        <p class="stats" id="accuracy-stats"></p>
        <button class="btn-restart" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const cardsData = [
        { id: 1, date: new Date(1440, 0, 1), text: "Gutenberg invents the printing press", img: "https://picsum.photos/id/357/150/150" },
        { id: 2, date: new Date(1550, 0, 1), text: "Potatoes brought to Europe", img: "https://picsum.photos/id/1080/150/150" },
        { id: 3, date: new Date(1770, 0, 1), text: "French potato fashion (Marie Antoinette)", img: "https://picsum.photos/id/1083/150/150" },
        { id: 4, date: new Date(1879, 0, 1), text: "Edison's practical light bulb", img: "https://picsum.photos/id/166/150/150" },
        { id: 5, date: new Date(1949, 0, 1), text: "McDonald's adds fries to the menu", img: "https://picsum.photos/id/1084/150/150" },
        { id: 6, date: new Date(1960, 0, 1), text: "Mashed Potato dance craze", img: "https://picsum.photos/id/1042/150/150" },
        { id: 7, date: new Date(1969, 6, 20), text: "Apollo 11 Moon landing", img: "https://picsum.photos/id/1049/150/150" },
        { id: 8, date: new Date(1969, 9, 29), text: "ARPANET (early internet) created", img: "https://picsum.photos/id/972/150/150" },
        { id: 9, date: new Date(1976, 3, 1), text: "Apple Inc. founded", img: "https://picsum.photos/id/145/150/150" },
        { id: 10, date: new Date(1989, 10, 9), text: "Fall of the Berlin Wall", img: "https://picsum.photos/id/141/150/150" },
        { id: 11, date: new Date(2007, 0, 9), text: "First iPhone released", img: "https://picsum.photos/id/345/150/150" },
        { id: 12, date: new Date(2018, 0, 1), text: "Raisin potato salad viral on SNL", img: "https://picsum.photos/id/1063/150/150" }
    ];

    let unplaced = [];
    let placed = [];
    let mistakes = 0;
    let isDragging = false;
    let startY, initialTop, currentDragIndex = -1;

    const trayCard = document.getElementById('current-card');
    const timeline = document.getElementById('timeline');
    const wrapper = document.getElementById('timeline-wrapper');

    function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }
    window.addEventListener('resize', setAppHeight);
    setAppHeight();

    function init() {
        unplaced = [...cardsData].sort(() => Math.random() - 0.5);
        renderIndicators();
        nextCard();
    }

    function renderIndicators() {
        timeline.innerHTML = '';
        for (let i = 0; i <= placed.length; i++) {
            const ind = document.createElement('div');
            ind.className = 'card-drop-indicator';
            ind.dataset.index = i;
            timeline.appendChild(ind);
            if (i < placed.length) timeline.appendChild(placed[i].el);
        }
    }

    function nextCard() {
        if (unplaced.length === 0) return endGame();
        const data = unplaced.shift();
        trayCard.dataset.id = data.id;
        trayCard.querySelector('img').src = data.img;
        trayCard.querySelector('.card-text').textContent = data.text;
        trayCard.style.visibility = 'visible';
    }

    // --- Drag Logic ---
    trayCard.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = trayCard.getBoundingClientRect();
        initialTop = rect.top;
        trayCard.classList.add('dragging');
        trayCard.style.width = rect.width + 'px';
    });

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        trayCard.style.top = (touch.clientY - 50) + 'px';
        trayCard.style.left = touch.clientX - (trayCard.offsetWidth/2) + 'px';

        // Auto Scroll
        const wrapperRect = wrapper.getBoundingClientRect();
        if (touch.clientY < wrapperRect.top + 50) wrapper.scrollTop -= 10;
        if (touch.clientY > wrapperRect.bottom - 50) wrapper.scrollTop += 10;

        // Find drop index
        let closestInd = -1;
        let minDist = Infinity;
        document.querySelectorAll('.card-drop-indicator').forEach(ind => {
            const rect = ind.getBoundingClientRect();
            const d = Math.abs(touch.clientY - rect.top);
            ind.classList.remove('show');
            if (d < minDist && d < 60) {
                minDist = d;
                closestInd = parseInt(ind.dataset.index);
            }
        });
        currentDragIndex = closestInd;
        if (closestInd !== -1) {
            document.querySelector(`.card-drop-indicator[data-index="${closestInd}"]`).classList.add('show');
        }
    }, { passive: false });

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        trayCard.classList.remove('dragging');
        trayCard.style.position = 'relative';
        trayCard.style.top = 'auto'; trayCard.style.left = 'auto';

        if (currentDragIndex !== -1) {
            handlePlacement(currentDragIndex);
        }
    });

    async function handlePlacement(index) {
        const data = cardsData.find(c => c.id == trayCard.dataset.id);
        const cardEl = createPlacedCard(data);
        trayCard.style.visibility = 'hidden';

        // Check relative correctness
        const temp = [...placed];
        temp.splice(index, 0, { data });
        const correct = (index === 0 || temp[index-1].data.date <= data.date) && 
                        (index === temp.length - 1 || data.date <= temp[index+1].data.date);

        if (correct) {
            cardEl.classList.add('correct');
            placed.splice(index, 0, { data, el: cardEl });
            renderIndicators();
        } else {
            mistakes++;
            cardEl.classList.add('incorrect');
            // Show at wrong position first
            insertAt(cardEl, index);
            
            await new Promise(r => setTimeout(r, 800));

            // Move to correct position
            placed.push({ data, el: cardEl });
            placed.sort((a, b) => a.data.date - b.data.date);
            renderIndicators();
            
            // Center the card
            cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            await new Promise(r => setTimeout(r, 600));
        }
        setTimeout(nextCard, 300);
    }

    function insertAt(el, index) {
        const indicators = document.querySelectorAll('.card-drop-indicator');
        timeline.insertBefore(el, indicators[index]);
    }

    function createPlacedCard(data) {
        const div = document.createElement('div');
        div.className = 'timeline-card';
        div.innerHTML = `
            <img src="${data.img}" class="card-img">
            <div class="card-content">
                <span class="date-badge">${data.date.getFullYear() < 0 ? Math.abs(data.date.getFullYear()) + ' BC' : data.date.getFullYear()}</span>
                <p class="card-text">${data.text}</p>
            </div>
        `;
        return div;
    }

    function endGame() {
        const modal = document.getElementById('end-modal');
        const slot = document.getElementById('medal-slot');
        const rank = document.getElementById('rank-name');
        const stats = document.getElementById('accuracy-stats');
        
        let medalHtml = '';
        if (mistakes === 0) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle gold-medal">1</div>';
            rank.textContent = "Gold Rank";
        } else if (mistakes === 1) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle silver-medal">2</div>';
            rank.textContent = "Silver Rank";
        } else if (mistakes === 2) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle bronze-medal">3</div>';
            rank.textContent = "Bronze Rank";
        } else {
            medalHtml = '<div class="star-shape">4</div>';
            rank.textContent = "Star Rank";
        }

        slot.innerHTML = medalHtml;
        stats.textContent = `Mistakes: ${mistakes} | Accuracy: ${Math.round(( (12-mistakes)/12 ) * 100)}%`;
        modal.style.display = 'flex';
    }

    init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Timeline Challenge</title>
    <style>
        :root {
            --primary-bg: #ffe45e;
            --game-bg: #f7f7f7;
            --card-green: #90d8a5;
            --card-pink: #f4a5b4;
            --card-white: #ffffff;
            --text-dark: #333333;
            --shadow: rgba(0, 0, 0, 0.1);
            --app-height: 100vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: var(--app-height);
            overflow: hidden; user-select: none;
        }

        #game-container {
            background-color: var(--game-bg);
            width: 100%; max-width: 430px;
            height: 100%;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* --- FIXED TIMELINE GUTTER --- */
        #timeline-gutter {
            position: absolute;
            left: 0; top: 60px; bottom: 140px;
            width: 55px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 40px 0;
            pointer-events: none;
            z-index: 10;
        }

        .gutter-line {
            position: absolute;
            top: 60px; bottom: 60px;
            width: 2px;
            background: #ddd;
            left: 50%; transform: translateX(-50%);
        }

        .gutter-label {
            font-size: 0.75rem; font-weight: 900; color: #bbb;
            text-transform: uppercase; letter-spacing: 1.5px;
            writing-mode: vertical-lr; transform: rotate(180deg);
            background: var(--game-bg); padding: 10px 0;
            z-index: 2;
        }

        /* --- PLAY AREA --- */
        #timeline-wrapper {
            flex-grow: 1;
            padding: 20px 15px 20px 70px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        #timeline {
            display: flex; flex-direction: column;
            width: 100%;
            position: relative;
        }

        .card-slot {
            overflow: visible; /* Changed to visible so shadows aren't clipped */
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .timeline-card {
            background: var(--card-white);
            border-radius: 18px;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex; align-items: center;
            width: 100%; height: 100px;
            border: 2px solid transparent;
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        .card-img {
            width: 80px; height: 80px;
            border-radius: 12px; margin: 10px;
            object-fit: cover; flex-shrink: 0;
            background: #eee;
        }

        .card-content { flex-grow: 1; padding-right: 15px; overflow: hidden; }

        .date-badge {
            display: inline-block;
            padding: 4px 10px; border-radius: 6px;
            font-size: 0.8rem; font-weight: bold;
            background: #e5e5e5; margin-bottom: 4px;
        }

        .card-text {
            font-size: 0.95rem; color: #333; margin: 0;
            line-height: 1.2; font-weight: 500;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* --- BOTTOM TRAY --- */
        #tray {
            height: 140px; background: white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 -5px 25px var(--shadow);
            z-index: 100; padding: 0 20px;
        }

        #current-card {
            width: 100%; max-width: 340px; height: 100px;
            background: white; border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex; align-items: center;
            touch-action: none; position: relative;
        }

        .dragging { opacity: 0.9; transform: scale(1.05); z-index: 5000; position: fixed !important; pointer-events: none; }

        /* Elevation for wrong answer sliding */
        .elevated {
            z-index: 9999 !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3) !important;
        }

        /* --- FEEDBACK --- */
        .card-drop-indicator {
            height: 0px; 
            width: 100%; 
            transition: height 0.3s;
            position: relative;
        }
        .card-drop-indicator.show { height: 10px; }
        .card-drop-indicator::after {
            content: ''; position: absolute; top: 3px; left: 0; right: 0; height: 4px;
            background: #8bb4e1; border-radius: 2px; opacity: 0;
        }
        .card-drop-indicator.show::after { opacity: 1; }

        .correct { border-color: var(--card-green); }
        .correct .date-badge { background: var(--card-green); }
        .incorrect { border-color: var(--card-pink); }
        .incorrect .date-badge { background: var(--card-pink); }

        /* --- END GAME --- */
        #end-modal {
            position: fixed; inset: 0;
            background: #fdfaf3; z-index: 10000;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }

        .medal-wrapper { position: relative; margin-bottom: 50px; height: 160px; display: flex; align-items: center; justify-content: center; }

        .medal-ribbon {
            width: 55px; height: 95px;
            background: #e35d5d; position: absolute;
            top: -15px; left: 50%; transform: translateX(-50%);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 80%, 0% 100%);
            z-index: 1; border: 2px solid rgba(0,0,0,0.1);
        }

        .medal-circle {
            width: 115px; height: 115px;
            border-radius: 50%; border: 6px solid #fff;
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .gold-medal { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .silver-medal { background: linear-gradient(135deg, #e0e0e0, #888); }
        .bronze-medal { background: linear-gradient(135deg, #cd7f32, #804a16); }
        
        .star-shape {
            width: 135px; height: 135px;
            background: #ffc107;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: white; font-weight: 900;
            box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
            padding-top: 5px;
        }

        .btn-restart {
            padding: 18px 60px; border-radius: 40px;
            border: none; background: #333;
            color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: transform 0.2s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="top-bar" style="padding: 20px; font-weight: 800; border-bottom: 1px solid #eee;">
        Timeline Challenge
    </div>

    <div id="timeline-gutter">
        <span class="gutter-label">Before</span>
        <div class="gutter-line"></div>
        <span class="gutter-label">After</span>
    </div>

    <div id="timeline-wrapper">
        <div id="timeline"></div>
    </div>

    <div id="tray">
        <div id="current-card">
            <img src="" class="card-img">
            <div class="card-content">
                <span class="date-badge">?</span>
                <p class="card-text"></p>
            </div>
        </div>
    </div>

    <div id="end-modal">
        <h1 style="margin-bottom: 5px; font-weight: 900; color: #d63384;">Happy Anniversary!</h1>
        <div class="medal-wrapper" id="medal-slot"></div>
        <h2 id="rank-name" style="margin: 5px 0;">Rank</h2>
        <p class="stats" id="accuracy-stats" style="color: #888; margin-bottom: 30px;"></p>
        <button class="btn-restart" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script>
    const cardsData = [
        { id: 1, date: new Date(1440, 0, 1), text: "Gutenberg invents the printing press", img: "https://picsum.photos/id/357/150/150" },
        { id: 2, date: new Date(1550, 0, 1), text: "Potatoes brought to Europe", img: "https://picsum.photos/id/1080/150/150" },
        { id: 3, date: new Date(1770, 0, 1), text: "French potato fashion (Marie Antoinette)", img: "https://picsum.photos/id/1083/150/150" },
        { id: 4, date: new Date(1879, 0, 1), text: "Edison's practical light bulb", img: "https://picsum.photos/id/166/150/150" },
        { id: 5, date: new Date(1949, 0, 1), text: "McDonald's adds fries to the menu", img: "https://picsum.photos/id/1084/150/150" },
        { id: 6, date: new Date(1960, 0, 1), text: "Mashed Potato dance craze", img: "https://picsum.photos/id/1042/150/150" },
        { id: 7, date: new Date(1969, 6, 20), text: "Apollo 11 Moon landing", img: "https://picsum.photos/id/1049/150/150" },
        { id: 8, date: new Date(1969, 9, 29), text: "ARPANET (early internet) created", img: "https://picsum.photos/id/972/150/150" },
        { id: 9, date: new Date(1976, 3, 1), text: "Apple Inc. founded", img: "https://picsum.photos/id/145/150/150" },
        { id: 10, date: new Date(1989, 10, 9), text: "Fall of the Berlin Wall", img: "https://picsum.photos/id/141/150/150" },
        { id: 11, date: new Date(2007, 0, 9), text: "First iPhone released", img: "https://picsum.photos/id/345/150/150" },
        { id: 12, date: new Date(2018, 0, 1), text: "Raisin potato salad viral on SNL", img: "https://picsum.photos/id/1063/150/150" }
    ];

    let unplaced = [];
    let placed = [];
    let mistakes = 0;
    let isDragging = false;
    let currentDragIndex = -1;
    let initialX, initialY;

    const trayCard = document.getElementById('current-card');
    const timeline = document.getElementById('timeline');
    const wrapper = document.getElementById('timeline-wrapper');

    function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }
    window.addEventListener('resize', setAppHeight);
    setAppHeight();

    function init() {
        unplaced = [...cardsData].sort(() => Math.random() - 0.5);
        const seed = unplaced.shift();
        const seedEl = createCardEl(seed);
        seedEl.classList.add('correct');
        placed.push({ data: seed, el: seedEl });
        
        renderTimeline(false);
        nextCard();
    }

    function renderTimeline(animate = true) {
        timeline.innerHTML = '';
        placed.forEach((item, i) => {
            const ind = document.createElement('div');
            ind.className = 'card-drop-indicator';
            ind.dataset.index = i;
            timeline.appendChild(ind);

            const slot = document.createElement('div');
            slot.className = 'card-slot';
            slot.appendChild(item.el);
            
            if (animate && item.isNew) {
                slot.style.height = '0px';
                requestAnimationFrame(() => slot.style.height = '115px');
                item.isNew = false;
            } else {
                slot.style.height = '115px';
            }
            timeline.appendChild(slot);
        });
        const lastInd = document.createElement('div');
        lastInd.className = 'card-drop-indicator';
        lastInd.dataset.index = placed.length;
        timeline.appendChild(lastInd);
    }

    function nextCard() {
        if (unplaced.length === 0) return endGame();
        const data = unplaced.shift();
        trayCard.dataset.id = data.id;
        trayCard.querySelector('img').src = data.img;
        trayCard.querySelector('.card-text').textContent = data.text;
        trayCard.style.visibility = 'visible';
    }

    trayCard.addEventListener('touchstart', (e) => {
        isDragging = true;
        const touch = e.touches[0];
        const rect = trayCard.getBoundingClientRect();
        initialX = touch.clientX - rect.left;
        initialY = touch.clientY - rect.top;
        trayCard.classList.add('dragging');
        trayCard.style.width = rect.width + 'px';
    });

    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const touch = e.touches[0];
        trayCard.style.left = (touch.clientX - initialX) + 'px';
        trayCard.style.top = (touch.clientY - initialY) + 'px';

        const wrapperRect = wrapper.getBoundingClientRect();
        if (touch.clientY < wrapperRect.top + 70) wrapper.scrollTop -= 12;
        if (touch.clientY > wrapperRect.bottom - 70) wrapper.scrollTop += 12;

        let closestInd = -1;
        let minDist = Infinity;
        document.querySelectorAll('.card-drop-indicator').forEach(ind => {
            const rect = ind.getBoundingClientRect();
            const d = Math.abs(touch.clientY - (rect.top + rect.height / 2));
            ind.classList.remove('show');
            if (d < minDist && d < 80) {
                minDist = d;
                closestInd = parseInt(ind.dataset.index);
            }
        });
        currentDragIndex = closestInd;
        if (closestInd !== -1) document.querySelector(`.card-drop-indicator[data-index="${closestInd}"]`).classList.add('show');
    }, { passive: false });

    document.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        trayCard.classList.remove('dragging');
        trayCard.style.position = 'relative';
        trayCard.style.top = 'auto'; trayCard.style.left = 'auto';
        if (currentDragIndex !== -1) handlePlacement(currentDragIndex);
        else trayCard.style.visibility = 'visible';
    });

    async function handlePlacement(index) {
        const data = cardsData.find(c => c.id == trayCard.dataset.id);
        const cardEl = createCardEl(data);
        trayCard.style.visibility = 'hidden';

        const temp = [...placed];
        temp.splice(index, 0, { data });
        const correct = (index === 0 || temp[index-1].data.date <= data.date) && 
                        (index === temp.length - 1 || data.date <= temp[index+1].data.date);

        if (correct) {
            cardEl.classList.add('correct');
            placed.splice(index, 0, { data, el: cardEl, isNew: true });
            renderTimeline(true);
            setTimeout(nextCard, 800);
        } else {
            mistakes++;
            cardEl.classList.add('incorrect');
            
            const indicators = document.querySelectorAll('.card-drop-indicator');
            const dummySlot = document.createElement('div');
            dummySlot.className = 'card-slot';
            dummySlot.style.height = '115px';
            dummySlot.appendChild(cardEl);
            timeline.insertBefore(dummySlot, indicators[index]);
            
            await new Promise(r => setTimeout(r, 1200));

            const firstRect = cardEl.getBoundingClientRect();
            placed.push({ data, el: cardEl });
            placed.sort((a, b) => a.data.date - b.data.date);
            renderTimeline(false);

            const lastRect = cardEl.getBoundingClientRect();
            const deltaY = firstRect.top - lastRect.top;

            // TRACKING CAMERA
            let startTime = null;
            const duration = 1800;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = (timestamp - startTime) / duration;
                if (progress < 1) {
                    cardEl.scrollIntoView({ block: 'center' });
                    requestAnimationFrame(step);
                }
            }

            // ELEVATE LAYER: Bring to top and add shadow
            cardEl.classList.add('elevated');

            cardEl.style.transition = 'none';
            cardEl.style.transform = `translateY(${deltaY}px)`;
            cardEl.offsetHeight; 
            
            cardEl.style.transition = 'transform 1.8s cubic-bezier(0.45, 0, 0.55, 1)';
            cardEl.style.transform = 'translateY(0)';

            requestAnimationFrame(step);
            await new Promise(r => setTimeout(r, 1900));
            
            cardEl.classList.remove('elevated');
            nextCard();
        }
    }

    function createCardEl(data) {
        const div = document.createElement('div');
        div.className = 'timeline-card';
        div.innerHTML = `
            <img src="${data.img}" class="card-img">
            <div class="card-content">
                <span class="date-badge">${data.date.getFullYear()}</span>
                <p class="card-text">${data.text}</p>
            </div>
        `;
        return div;
    }

    function endGame() {
        const modal = document.getElementById('end-modal');
        const slot = document.getElementById('medal-slot');
        const rank = document.getElementById('rank-name');
        const stats = document.getElementById('accuracy-stats');
        
        let medalHtml = '';
        if (mistakes <= 1) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle gold-medal">1</div>';
            rank.textContent = "Gold Rank";
        } else if (mistakes <= 3) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle silver-medal">2</div>';
            rank.textContent = "Silver Rank";
        } else if (mistakes <= 5) {
            medalHtml = '<div class="medal-ribbon"></div><div class="medal-circle bronze-medal">3</div>';
            rank.textContent = "Bronze Rank";
        } else {
            medalHtml = '<div class="star-shape">4</div>';
            rank.textContent = "Star Rank";
        }

        slot.innerHTML = medalHtml;
        stats.textContent = `Mistakes: ${mistakes} | Accuracy: ${Math.round(((12-mistakes)/12)*100)}%`;
        modal.style.display = 'flex';
    }

    init();
</script>
</body>
</html>

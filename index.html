<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Wife's Timeline Game</title>
    <style>
        /* General Styles */
        :root {
            --primary-bg: #ffe45e; /* Yellow background */
            --card-purple: #c3a1e6;
            --card-yellow: #f8e178;
            --card-green: #90d8a5;
            --card-pink: #f4a5b4;
            --card-white: #ffffff;
            --text-dark: #333333;
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-medium: rgba(0, 0, 0, 0.2);
            --border-radius-card: 15px;
            --border-radius-sm: 8px;
            --font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll */
            user-select: none; /* Disable text selection */
            -webkit-user-select: none; /* For iOS */
            touch-action: pan-y; /* Allow vertical scrolling if necessary, but try to keep to game interactions */
        }

        #game-container {
            background-color: #f7f7f7; /* Lighter background for the app frame */
            width: 100vw;
            height: 100vh;
            max-width: 430px; /* iPhone 16 Pro Max width approximation */
            max-height: 932px; /* iPhone 16 Pro Max height approximation */
            border-radius: 40px; /* App frame rounded corners */
            box-shadow: 0 10px 30px var(--shadow-medium);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Keep content within rounded frame */
            position: relative;
        }

        /* Top Bar */
        #top-bar {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            color: var(--text-dark);
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px var(--shadow-light);
            z-index: 10;
        }

        #top-bar .arrow-back {
            font-size: 1.8rem;
            margin-right: 15px;
            cursor: pointer;
        }

        /* Timeline Play Area */
        #timeline-wrapper {
            flex-grow: 1;
            padding: 20px 10px;
            overflow-y: auto; /* Scrollable timeline */
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #timeline-label {
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }

        #timeline-label::before {
            content: '';
            width: 2px;
            height: calc(100% - 20px); /* Adjust height as needed */
            background-color: #ccc;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 25px;
            z-index: 0;
        }

        #timeline-label span {
            writing-mode: vertical-lr;
            text-orientation: mixed;
            transform: rotate(180deg);
            margin-bottom: 5px;
        }

        #timeline {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Spacing between cards */
            width: 100%;
            max-width: 350px; /* Limit width of cards for better readability */
            padding-left: 50px; /* Make space for 'Before' label */
            padding-bottom: 20px;
            position: relative;
        }

        #timeline.drag-over-active .card-placeholder {
            opacity: 0.3;
            height: 120px; /* Placeholder height, match card */
            margin: 10px 0;
        }

        .timeline-card {
            background-color: var(--card-white);
            border-radius: var(--border-radius-card);
            box-shadow: 0 5px 15px var(--shadow-light);
            display: flex;
            align-items: center;
            width: 100%;
            cursor: grab;
            transition: transform 0.3s ease-in-out, box-shadow 0.2s ease-in-out, opacity 0.3s ease-in-out, background-color 0.3s ease-in-out;
            position: relative;
            z-index: 5;
            min-height: 100px; /* Ensure consistent height */
        }

        .timeline-card.correct {
            border: 2px solid var(--card-green);
        }

        .timeline-card.incorrect {
            border: 2px solid var(--card-pink);
        }

        .timeline-card .card-image-container {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            margin: 10px;
            flex-shrink: 0;
            background-color: #eee; /* Placeholder for image loading */
        }

        .timeline-card .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .timeline-card .card-content {
            flex-grow: 1;
            padding: 10px 10px 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .timeline-card .card-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: var(--border-radius-sm);
            align-self: flex-start; /* Align date bubble to top-left of content */
        }

        .timeline-card .card-text {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.3;
        }

        .timeline-card .feedback-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white; /* Default color, will be overridden by classes */
            background-color: transparent;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1; /* For better icon centering */
        }

        .timeline-card .feedback-icon.show {
            opacity: 1;
        }

        .timeline-card .feedback-icon.correct-icon {
            background-color: var(--card-green);
        }

        .timeline-card .feedback-icon.incorrect-icon {
            background-color: var(--card-pink);
        }

        /* Card Holder Area */
        #card-holder-area {
            background-color: var(--card-white);
            padding: 15px 20px;
            box-shadow: 0 -5px 20px var(--shadow-light);
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 140px; /* Ensure consistent height */
            position: relative;
        }

        #current-card {
            width: 90%;
            max-width: 320px; /* Similar to timeline card width */
            background-color: var(--card-white);
            border-radius: var(--border-radius-card);
            box-shadow: 0 5px 15px var(--shadow-medium);
            display: flex;
            align-items: center;
            cursor: grab;
            position: relative;
            z-index: 10;
            min-height: 100px;
        }

        #current-card.dragging {
            opacity: 0.7;
            transform: scale(1.05);
        }

        #current-card .card-image-container {
            width: 80px;
            height: 80px;
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            margin: 10px;
            flex-shrink: 0;
            background-color: #eee;
        }

        #current-card .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #current-card .card-content {
            flex-grow: 1;
            padding: 10px 10px 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #current-card .card-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: #888; /* Hidden date is lighter */
            margin-bottom: 5px;
            padding: 5px 10px;
            border-radius: var(--border-radius-sm);
            background-color: #f0f0f0;
            align-self: flex-start;
        }

        #current-card .card-text {
            font-size: 0.95rem;
            color: var(--text-dark);
            line-height: 1.3;
        }

        /* Drag over indicator */
        .card-drop-indicator {
            height: 5px;
            background-color: #8bb4e1; /* Blue indicator */
            width: 80%;
            border-radius: 5px;
            margin: 0 auto; /* Center the indicator */
            transition: transform 0.2s ease-in-out, opacity 0.2s ease-in-out;
            opacity: 0;
            z-index: 1; /* Below cards */
        }

        .timeline-card.drag-over-target {
            box-shadow: 0 0 0 3px #8bb4e1;
            transform: scale(1.02);
        }

        /* Modal for Game End */
        #game-end-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        #game-end-modal.show {
            opacity: 1;
            visibility: visible;
        }

        #game-end-modal h2 {
            font-size: 2.2rem;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        #game-end-modal .trophy-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounceIn 0.8s ease-out forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        #game-end-modal p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
        }

        #game-end-modal button {
            background-color: var(--primary-bg);
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius-sm);
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 5px 15px var(--shadow-light);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        #game-end-modal button:active {
            transform: scale(0.98);
        }

        /* Helper classes */
        .hidden {
            display: none !important;
        }

        /* Font Awesome for icons */
        @import url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css");
    </style>
</head>
<body>

    <div id="game-container">
        <div id="top-bar">
            <span class="arrow-back"><i class="fas fa-arrow-left"></i></span>
            Timeline Challenge
        </div>

        <div id="timeline-wrapper">
            <div id="timeline-label">
                <span>Before</span>
                <span style="margin-top: auto; margin-bottom: 0;">After</span>
            </div>
            <div id="timeline">
                <!-- Placed cards will go here -->
                <div class="card-drop-indicator top-indicator" data-index="0" style="opacity: 1;"></div>
            </div>
        </div>

        <div id="card-holder-area">
            <div id="current-card" draggable="true">
                <div class="card-image-container">
                    <img src="" alt="Event Image">
                </div>
                <div class="card-content">
                    <div class="card-date">?</div>
                    <div class="card-text">Drag this card to the timeline!</div>
                </div>
            </div>
        </div>

        <div id="game-end-modal">
            <h2>Game Over!</h2>
            <div class="trophy-icon"></div>
            <p id="score-message"></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const cardsData = [
            // --- Easily modify card data here ---
            // Format: { id: uniqueId, image: 'URL_TO_IMAGE', text: 'Event Description', date: new Date('YYYY-MM-DD') }
            // Use placeholder images for now, replace with your Google Photos links
            { id: 'potatoes', image: 'https://via.placeholder.com/150/C3A1E6/FFFFFF?text=Potatoes', text: 'Potatoes brought to Europe', date: new Date('1550-01-01') },
            { id: 'french-fashion', image: 'https://via.placeholder.com/150/F8E178/FFFFFF?text=French+Fashion', text: 'French potato fashion', date: new Date('1770-01-01') },
            { id: 'mashed-potato-dance', image: 'https://via.placeholder.com/150/90D8A5/FFFFFF?text=Mashed+Potato', text: 'Mashed Potato dance craze', date: new Date('1960-01-01') },
            { id: 'snl-salad', image: 'https://via.placeholder.com/150/F4A5B4/FFFFFF?text=SNL+Salad', text: 'Raisin potato salad on SNL', date: new Date('2018-01-01') },
            { id: 'mcdonalds-fries', image: 'https://via.placeholder.com/150/FFD700/FFFFFF?text=McDonalds+Fries', text: "McDonald's adds fries to the menu", date: new Date('1949-01-01') },
            // Add more cards here:
            // { id: 'new-event-1', image: 'YOUR_IMAGE_URL_1', text: 'Description of event 1', date: new Date('YEAR-MONTH-DAY') },
            // { id: 'new-event-2', image: 'YOUR_IMAGE_URL_2', text: 'Description of event 2', date: new Date('YEAR-MONTH-DAY') },
        ];
        // --- End of card data modification area ---

        const gameContainer = document.getElementById('game-container');
        const timeline = document.getElementById('timeline');
        const cardHolderArea = document.getElementById('card-holder-area');
        const currentCardElement = document.getElementById('current-card');
        const gameEndModal = document.getElementById('game-end-modal');
        const scoreMessage = document.getElementById('score-message');
        const trophyIcon = gameEndModal.querySelector('.trophy-icon');

        let unplacedCards = [];
        let placedCards = []; // Stores objects: { cardData: {...}, element: DOM_ELEMENT, isCorrect: boolean, isFixed: boolean }
        let currentCard = null;
        let currentCardIndex = 0;
        let wrongAnswers = 0;
        let dragTargetIndex = -1; // The index in placedCards array where the current card would be inserted

        // Helper to format date for display
        function formatDate(date) {
            return date.toLocaleString('en-US', { year: 'numeric', month: 'short' });
        }

        // Shuffles an array (Fisher-Yates algorithm)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initializeGame() {
            // Reset state
            unplacedCards = [...cardsData];
            shuffleArray(unplacedCards); // Shuffle the cards to be placed
            placedCards = [];
            currentCardIndex = 0;
            wrongAnswers = 0;
            dragTargetIndex = -1;

            timeline.innerHTML = '<div class="card-drop-indicator top-indicator" data-index="0" style="opacity: 1;"></div>'; // Clear timeline, add initial indicator
            gameEndModal.classList.remove('show');

            loadNextCard();
        }

        function createCardElement(cardData, isDraggable = false) {
            const cardEl = document.createElement('div');
            cardEl.classList.add('timeline-card');
            if (isDraggable) {
                cardEl.classList.add('current-card-draggable'); // This class is for the active draggable card
                cardEl.setAttribute('draggable', 'true');
            }
            cardEl.dataset.id = cardData.id;

            cardEl.innerHTML = `
                <div class="card-image-container">
                    <img src="${cardData.image}" alt="${cardData.text}">
                </div>
                <div class="card-content">
                    <div class="card-date hidden-date" style="background-color: ${getCardColor(cardData.id)}; color: var(--text-dark);">?</div>
                    <div class="card-text">${cardData.text}</div>
                </div>
                <div class="feedback-icon correct-icon"><i class="fas fa-check"></i></div>
                <div class="feedback-icon incorrect-icon"><i class="fas fa-times"></i></div>
            `;
            return cardEl;
        }

        // Assign colors based on initial mock-up for consistency
        function getCardColor(id) {
            switch (id) {
                case 'potatoes': return var_color('--card-purple');
                case 'french-fashion': return var_color('--card-yellow');
                case 'mashed-potato-dance': return var_color('--card-green');
                case 'snl-salad': return var_color('--card-pink');
                case 'mcdonalds-fries': return 'lightcoral'; // A new color if needed
                default: return '#cccccc'; // Default for new cards
            }
        }

        function var_color(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName);
        }

        function loadNextCard() {
            if (unplacedCards.length === 0) {
                endGame();
                return;
            }

            currentCard = unplacedCards.shift(); // Get the next card
            currentCardElement.dataset.id = currentCard.id;
            currentCardElement.querySelector('img').src = currentCard.image;
            currentCardElement.querySelector('.card-text').textContent = currentCard.text;
            currentCardElement.querySelector('.card-date').textContent = '?';
            currentCardElement.querySelector('.card-date').style.backgroundColor = getCardColor(currentCard.id);
            currentCardElement.classList.remove('hidden'); // Ensure card is visible
        }

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', currentCard.id);
            e.dataTransfer.effectAllowed = 'move';
            currentCardElement.classList.add('dragging');

            // Hide all drop indicators initially
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => {
                indicator.style.opacity = '0';
            });
        }

        function handleDragEnd(e) {
            currentCardElement.classList.remove('dragging');
            // Hide all drop indicators after drag ends
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => {
                indicator.style.opacity = '0';
            });
            dragTargetIndex = -1; // Reset target index
        }

        function handleDragOver(e) {
            e.preventDefault(); // Necessary to allow dropping
            e.dataTransfer.dropEffect = 'move';

            const target = e.target.closest('.timeline-card, .card-drop-indicator');
            if (!target) {
                dragTargetIndex = -1;
                hideAllDropIndicators();
                return;
            }

            hideAllDropIndicators(); // Hide all before showing new one

            let newTargetIndex = -1;
            if (target.classList.contains('timeline-card')) {
                const rect = target.getBoundingClientRect();
                const midPoint = rect.top + rect.height / 2;
                const targetCardId = target.dataset.id;
                const targetCardPlacedIndex = placedCards.findIndex(pc => pc.cardData.id === targetCardId);

                if (e.clientY < midPoint) {
                    // Dropping above the card
                    newTargetIndex = targetCardPlacedIndex;
                } else {
                    // Dropping below the card
                    newTargetIndex = targetCardPlacedIndex + 1;
                }
            } else if (target.classList.contains('card-drop-indicator')) {
                newTargetIndex = parseInt(target.dataset.index);
            }

            if (newTargetIndex !== -1) {
                const indicator = timeline.querySelector(`.card-drop-indicator[data-index="${newTargetIndex}"]`);
                if (indicator) {
                    indicator.style.opacity = '1';
                }
                dragTargetIndex = newTargetIndex;
            } else {
                dragTargetIndex = -1;
            }
        }

        function hideAllDropIndicators() {
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => {
                indicator.style.opacity = '0';
            });
        }

        function handleDrop(e) {
            e.preventDefault();
            hideAllDropIndicators();

            if (dragTargetIndex === -1) {
                // Not dropped on a valid target, do nothing
                return;
            }

            placeCard(currentCard, dragTargetIndex);
            dragTargetIndex = -1; // Reset target index
        }

        function placeCard(cardData, insertionIndex) {
            const newPlacedCard = {
                cardData: cardData,
                element: createCardElement(cardData),
                isCorrect: false,
                isFixed: false
            };

            // Remove the card from the card holder
            currentCardElement.classList.add('hidden');

            // Insert into the DOM immediately
            insertCardElementIntoTimeline(newPlacedCard.element, insertionIndex);

            // Temporarily insert into placedCards array to check relative order
            const tempPlacedCards = [...placedCards];
            tempPlacedCards.splice(insertionIndex, 0, newPlacedCard);

            // Check correctness of *all* cards
            let allCorrect = true;
            for (let i = 0; i < tempPlacedCards.length; i++) {
                const card = tempPlacedCards[i];
                let cardCorrect = true;

                // Check previous card
                if (i > 0 && tempPlacedCards[i-1].cardData.date.getTime() > card.cardData.date.getTime()) {
                    cardCorrect = false;
                }
                // Check next card
                if (i < tempPlacedCards.length - 1 && tempPlacedCards[i+1].cardData.date.getTime() < card.cardData.date.getTime()) {
                    cardCorrect = false;
                }
                card.isCorrect = cardCorrect;
                if (!cardCorrect) allCorrect = false;
            }

            if (newPlacedCard.isCorrect) {
                // If the new card's placement is correct relative to its immediate neighbors
                newPlacedCard.element.classList.add('correct');
                newPlacedCard.element.querySelector('.feedback-icon.correct-icon').classList.add('show');
                newPlacedCard.isFixed = true; // Fix correct cards
            } else {
                newPlacedCard.element.classList.add('incorrect');
                newPlacedCard.element.querySelector('.feedback-icon.incorrect-icon').classList.add('show');
                wrongAnswers++;
            }

            // Reveal date for the newly placed card
            newPlacedCard.element.querySelector('.card-date').textContent = formatDate(cardData.date);

            // Update the main placedCards array
            placedCards = tempPlacedCards;

            // If any card is incorrect, resort and re-render the timeline
            if (!allCorrect) {
                // Find the truly sorted position
                const correctSortedIndex = [...placedCards].sort((a,b) => a.cardData.date.getTime() - b.cardData.date.getTime())
                                            .findIndex(pc => pc.cardData.id === newPlacedCard.cardData.id);

                // Move the actual DOM element to its correct place if it was initially wrong
                if (insertionIndex !== correctSortedIndex) {
                    // Remove current element, then re-insert it at the correct index
                    newPlacedCard.element.remove();
                    insertCardElementIntoTimeline(newPlacedCard.element, correctSortedIndex);

                    // Update placedCards array to reflect the correct sorted position
                    const currentItemIndex = placedCards.indexOf(newPlacedCard);
                    if (currentItemIndex > -1) {
                        placedCards.splice(currentItemIndex, 1);
                    }
                    placedCards.splice(correctSortedIndex, 0, newPlacedCard);
                }

                // Re-evaluate correctness for all cards after auto-correction
                // (Though for this specific game, the feedback is given on *initial* drop, then it corrects)
                // We'll keep the 'incorrect' class if the initial drop was wrong, but the card is now in the right place.
            }

            // After placement, always re-render drop indicators
            renderDropIndicators();

            // Load next card after a short delay for visual feedback
            setTimeout(loadNextCard, 1000);
        }

        function insertCardElementIntoTimeline(cardElement, index) {
            const dropIndicators = timeline.querySelectorAll('.card-drop-indicator');
            if (index >= dropIndicators.length) {
                timeline.appendChild(cardElement);
            } else {
                timeline.insertBefore(cardElement, dropIndicators[index]);
            }
        }

        function renderDropIndicators() {
            // Remove existing indicators
            document.querySelectorAll('.card-drop-indicator').forEach(indicator => indicator.remove());

            // Add new indicators based on current placedCards length
            for (let i = 0; i <= placedCards.length; i++) {
                const indicator = document.createElement('div');
                indicator.classList.add('card-drop-indicator');
                indicator.dataset.index = i;
                timeline.insertBefore(indicator, (i < placedCards.length ? placedCards[i].element : null));
            }
            // Ensure the first indicator is always visible to hint where to drop first card
            if (placedCards.length === 0) {
                 timeline.querySelector('.card-drop-indicator[data-index="0"]').style.opacity = '1';
            }
        }


        function endGame() {
            let resultText = '';
            let trophyClass = '';

            if (wrongAnswers === 0) {
                resultText = "Amazing! You got a Gold Star! Your knowledge of history is impeccable!";
                trophyClass = 'fas fa-medal gold'; // Assuming gold icon in FA
                trophyIcon.style.color = 'gold';
            } else if (wrongAnswers <= 1) {
                resultText = "Excellent! You earned a Silver Star! Just one slip-up, well done!";
                trophyClass = 'fas fa-medal silver';
                trophyIcon.style.color = 'silver';
            } else if (wrongAnswers <= 2) {
                resultText = "Good Job! You got a Bronze Star! A few corrections, but you persevered!";
                trophyClass = 'fas fa-medal bronze';
                trophyIcon.style.color = '#cd7f32'; /* Bronze color */
            } else {
                resultText = `You completed the timeline with ${wrongAnswers} wrong answers. Keep practicing!`;
                trophyClass = 'fas fa-star';
                trophyIcon.style.color = '#888';
            }

            scoreMessage.textContent = resultText;
            trophyIcon.className = `trophy-icon ${trophyClass}`;
            gameEndModal.classList.add('show');
        }

        function restartGame() {
            initializeGame();
        }

        // --- Event Listeners ---
        currentCardElement.addEventListener('dragstart', handleDragStart);
        currentCardElement.addEventListener('dragend', handleDragEnd);

        timeline.addEventListener('dragover', handleDragOver);
        timeline.addEventListener('dragleave', () => {
             hideAllDropIndicators();
             dragTargetIndex = -1;
        });
        timeline.addEventListener('drop', handleDrop);

        // Initial setup
        initializeGame();
        renderDropIndicators(); // Render initial indicators even before first card is placed

        // Prevent default touch behavior for potential drag issues
        document.addEventListener('touchstart', function(event) {
            if (event.target.closest('#current-card')) {
                // For the draggable card, prevent default to allow custom drag handling if needed,
                // but native HTML5 drag/drop usually works on modern mobile browsers.
                // However, if issues arise, a custom touch-drag implementation might be necessary.
            } else if (event.target.closest('#timeline')) {
                // Allow vertical scrolling in the timeline if needed
                return true;
            }
            // event.preventDefault(); // Uncomment if you want to disable all default touch scroll/zoom
        }, { passive: false });

        document.addEventListener('touchmove', function(event) {
            // This is primarily for custom drag, if native HTML5 drag fails on mobile.
            // For now, relying on native.
        }, { passive: false });

    </script>
</body>
</html>

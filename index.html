<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Timeline Puzzle for My Love!</title>
    <!-- No favicon to avoid Chrome warnings and match original app -->
    <!-- Font Awesome for tick/cross icons and header icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --yellow-bg: #FFD700; /* A vibrant yellow */
            --card-bg-light: #FFFFFF;
            --card-shadow: rgba(0, 0, 0, 0.15); /* More pronounced shadow */
            --text-color: #333;
            --header-text-color: #000;
            --timeline-line-color: #ccc;
            --insertion-point-color: #007bff;
            --correct-color: #28a745;
            --incorrect-color: #dc3545;
            --modal-bg: rgba(0, 0, 0, 0.6);
            --modal-content-bg: #fff;
            --active-card-border: #007bff; /* Border for selected card */
        }

        /* Base styles for iPhone 16 Pro Max */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling on the main body */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            color: var(--text-color);
            background-color: var(--yellow-bg);
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            /* Safe area insets for iPhone notch/dynamic island */
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Header Styles */
        .app-header {
            background-color: var(--yellow-bg);
            padding: 1.5vh 4vw; /* Adjusted padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;
            position: relative;
            overflow: hidden;
        }

        .header-top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2vw;
            z-index: 1;
        }

        .book-icon-container {
            background-color: #FFC0CB; /* Pink */
            border-radius: 50%;
            width: 8vh;
            height: 8vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .book-icon-container i {
            color: #fff;
            font-size: 4vh;
        }

        .stars-container {
            display: flex;
            gap: 1vw;
            font-size: 3vh;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .play-puzzle-banner {
            background-color: var(--card-bg-light);
            border-radius: 2.5vh;
            padding: 2.5vh 6vw; /* Original padding for banner */
            box-shadow: 0 4px 10px var(--card-shadow);
            font-size: 3.2vh; /* Original font size for banner */
            font-weight: 600;
            color: var(--header-text-color);
            text-align: center;
            width: 80%;
            max-width: 400px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* Game Area */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #F8F8F8;
            border-top-left-radius: 4vh;
            border-top-right-radius: 4vh;
            overflow: hidden;
            position: relative;
        }

        /* Timeline Wrapper */
        .timeline-wrapper {
            flex-grow: 1;
            position: relative;
            padding: 2vh 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-line {
            position: absolute;
            left: 10vw;
            top: 0;
            bottom: 0;
            width: 2px; /* Original thickness */
            background-color: var(--timeline-line-color);
            z-index: 0;
        }

        .timeline-label {
            position: absolute;
            left: 10vw;
            transform-origin: 0 0;
            transform: translateX(-50%) rotate(-90deg); /* Vertical text */
            font-size: 1.8vh;
            font-weight: 500;
            color: #888;
            background-color: #F8F8F8;
            padding: 0 1vw;
            z-index: 1;
            white-space: nowrap;
        }

        .before-label {
            top: 10vh;
            left: calc(10vw - 1.5vh);
        }

        .after-label {
            bottom: 10vh;
            left: calc(10vw - 1.5vh);
        }

        .timeline-cards-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: calc(10vw + 20px);
            padding-right: 4vw;
            gap: 2vh; /* Original spacing */
            min-height: 100%;
            box-sizing: border-box;
        }

        /* Card Styles */
        .card {
            background-color: var(--card-bg-light);
            border-radius: 2vh;
            box-shadow: 0 4px 8px var(--card-shadow);
            display: flex;
            align-items: center;
            padding: 1.5vh 2vw;
            width: 100%;
            max-width: 80vw;
            box-sizing: border-box;
            position: relative;
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out, border 0.2s ease-in-out;
            margin-left: 0;
        }

        .card.incorrect {
            animation: shake 0.5s;
            border: 2px solid var(--incorrect-color);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .card-image {
            width: 10vh; /* Original image size */
            height: 10vh;
            border-radius: 1.5vh; /* Original border-radius */
            object-fit: cover;
            margin-right: 3vw;
            flex-shrink: 0;
        }

        .card-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.5vh;
        }

        .card-date-pill { /* Renamed from card-date-pill to card-date-box for clarity */
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 0.8vh; /* Slightly less rounded for box look */
            padding: 0.5vh 1.5vw;
            font-size: 1.8vh; /* Original font size for date */
            font-weight: 600;
            color: #555;
            align-self: flex-start;
            margin-bottom: 0.5vh;
        }

        .card-text {
            font-size: 2.2vh; /* Original text size */
            line-height: 1.3;
            color: var(--text-color);
        }

        .card-status-icon {
            position: absolute;
            top: 1.5vh;
            right: 2vw;
            font-size: 2.5vh;
            color: #ccc; /* Default grey for outline */
        }

        .card-status-icon.correct {
            color: var(--correct-color);
        }

        .card-status-icon.incorrect {
            color: var(--incorrect-color);
        }

        /* Insertion Point Styles */
        .insertion-point {
            width: 100%;
            height: 2vh; /* Very subtle height */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Indicate clickable */
            position: relative;
            z-index: 2;
            transition: background-color 0.2s ease-in-out;
        }

        .insertion-point::before {
            content: '';
            position: absolute;
            left: 10vw; /* Align with timeline line */
            transform: translateX(-50%);
            width: 1.5vh; /* Dot size */
            height: 1.5vh; /* Dot size */
            background-color: var(--timeline-line-color); /* Grey dot by default */
            border-radius: 50%;
            opacity: 0.7;
            transition: background-color 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .insertion-point.active::before { /* Active state for insertion point */
            background-color: var(--insertion-point-color); /* Blue dot when active */
            transform: translateX(-50%) scale(1.2); /* Slightly larger */
        }

        /* Card Holder */
        .card-holder-container {
            background-color: var(--card-bg-light);
            padding: 3vh 4vw;
            box-shadow: 0 -4px 10px var(--card-shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 18vh;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        .card-holder-container .card {
            width: 90%;
            max-width: 90vw;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            cursor: pointer; /* Indicate clickable */
            transform: rotate(-2deg); /* Slight rotation */
            border: 2px solid transparent; /* Default transparent border */
        }

        .card-holder-container .card.active {
            border: 2px solid var(--active-card-border); /* Blue border when active */
        }

        .remaining-cards-count {
            position: absolute;
            left: 4vw;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5vh;
            font-weight: 600;
            color: #888;
            display: flex;
            align-items: center;
            gap: 0.5vw;
        }
        .remaining-cards-count i {
            font-size: 2vh;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: var(--modal-bg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--modal-content-bg);
            margin: auto;
            padding: 6vh 8vw;
            border-radius: 3vh;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 400px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
        }

        .modal-content h2 {
            font-size: 4vh;
            color: var(--header-text-color);
            margin-bottom: 1vh;
        }

        .modal-content p {
            font-size: 2.5vh;
            line-height: 1.4;
            color: var(--text-color);
            margin-bottom: 2vh;
        }

        #result-medal {
            font-size: 8vh;
            margin-bottom: 2vh;
        }

        #result-medal .gold { color: gold; }
        #result-medal .silver { color: silver; }
        #result-medal .bronze { color: #cd7f32; }
        #result-medal .star { color: #FFD700; }


        #play-again-button {
            background-color: var(--insertion-point-color);
            color: white;
            padding: 2.5vh 5vw;
            border: none;
            border-radius: 2vh;
            font-size: 2.8vh;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        #play-again-button:hover {
            background-color: #0056b3;
        }

        /* Specific card background colors */
        .card[data-color="#D8BFD8"] { background-color: #D8BFD8; } /* Thistle */
        .card[data-color="#FFFF99"] { background-color: #FFFF99; } /* Light Yellow */
        .card[data-color="#90EE90"] { background-color: #90EE90; } /* Light Green */
        .card[data-color="#FFB6C1"] { background-color: #FFB6C1; } /* Light Pink */
        .card[data-color="#FFFFFF"] { background-color: #FFFFFF; } /* White */
        .card[data-color="#ADD8E6"] { background-color: #ADD8E6; } /* Light Blue */
        .card[data-color="#FFD700"] { background-color: #FFD700; } /* Gold */
        .card[data-color="#FFC0CB"] { background-color: #FFC0CB; } /* Pink */
    </style>
</head>
